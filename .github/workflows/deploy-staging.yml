name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_CONTAINER_NAME: urban-platform-staging
  DOCKER_IMAGE: neikow/urban-platform-staging
  DOCKER_REGISTRY: ghcr.io
  SENTRY_ORG: ${{ vars.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

jobs:
  ci:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml

  sentry-release:
    name: Create Sentry Release
    runs-on: ubuntu-latest
    needs: ci
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ env.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT }}
        with:
          environment: staging
          version: ${{ github.sha }}

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sentry-release
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}

  deploy:
    name: Trigger Portainer Deployment (staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Trigger Portainer webhook
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.DEPLOYMENT_WEBHOOK }}"
