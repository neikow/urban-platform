x-django-common: &django-common
    image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:latest
    volumes:
        - uv_cache:/app/.cache/uv
    networks:
        - internal
    environment:
        - ENVIRONMENT=${ENVIRONMENT}
        # Database configuration
        - DB_HOST=${DB_HOST}
        - DB_PORT=${DB_PORT}
        - DB_NAME=${DB_NAME}
        - DB_USER=${DB_USER}
        - DB_PASSWORD=${DB_PASSWORD}
        # Django configuration
        - WEBSITE_NAME=${WEBSITE_NAME}
        - BASE_URL=${BASE_URL}
        - SECRET_KEY=${SECRET_KEY}
        - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
        - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
        - ALLOWED_HOSTS=${ALLOWED_HOSTS}
        # Brevo configuration
        - BREVO_API_KEY=${BREVO_API_KEY}
        - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
        - DEFAULT_FROM_NAME=${DEFAULT_FROM_NAME}
        # Sentry configuration
        - SENTRY_DSN=${SENTRY_DSN}
        - SENTRY_RELEASE=${SENTRY_RELEASE}

services:
    web:
        <<: *django-common
        container_name: ${COMPOSE_PROJECT_NAME:-urban-platform}-web
        command: uv run gunicorn urban_platform.wsgi:application -c gunicorn.conf.py
        volumes:
            - static_volume:/app/staticfiles
            - media_volume:/app/mediafiles
            - uv_cache:/app/.cache/uv
        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:8000/ || exit 1" ]
            interval: 1m30s
            timeout: 5s
            retries: 3
            start_period: 30s
        depends_on:
            db:
                condition: service_healthy
            cache:
                condition: service_healthy
            volume_init:
                condition: service_completed_successfully
            migrator:
                condition: service_completed_successfully
        restart: always
        networks:
            internal:
                aliases:
                    - ${COMPOSE_PROJECT_NAME:-urban-platform}-web-backend

    nginx:
        container_name: ${COMPOSE_PROJECT_NAME:-urban-platform}
        image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE}-nginx:latest
        volumes:
            - static_volume:/app/staticfiles
            - media_volume:/app/mediafiles
        hostname: ${COMPOSE_PROJECT_NAME:-urban-platform}
        environment:
            - UPSTREAM_NAME=${COMPOSE_PROJECT_NAME:-urban-platform}-web-backend
        depends_on:
            - web
            - static_collector
        restart: always
        networks:
            - nginx
            - internal

    cache:
        image: redis:7.4.2
        command: redis-server --save 20 1 --loglevel warning
        restart: always
        volumes:
            - 'redis_data:/data'
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - internal

    worker:
        <<: *django-common
        container_name: ${COMPOSE_PROJECT_NAME:-urban-platform}-worker
        command: uv run celery -A urban_platform worker --loglevel=info
        volumes:
            - media_volume:/app/mediafiles
            - uv_cache:/app/.cache/uv
        depends_on:
            db:
                condition: service_started
            cache:
                condition: service_started
            volume_init:
                condition: service_completed_successfully
            migrator:
                condition: service_completed_successfully
        restart: always
        healthcheck:
            test: [ "CMD-SHELL", "uv run celery -A urban_platform inspect ping" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s

    #  celery_beat:
    #    container_name: urban-platform-staging-celery-beat
    #    image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:latest
    #    command: uv run celery -A urban_platform beat --loglevel=info
    #    volumes:
    #      - uv_cache:/app/.cache/uv
    #    depends_on:
    #      - db
    #      - cache
    #    restart: always
    #    networks:
    #      - internal

    db:
        image: postgres:17
        volumes:
            - postgres_data:/var/lib/postgresql/data/
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        restart: always
        networks:
            - internal
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
            interval: 5s
            timeout: 5s
            retries: 5

    # One-shot: named volumes mounted over the image's appuser-owned dirs keep
    # their own (often root) ownership, which blocks the non-root containers from
    # writing. Chown them to the runtime uid (1000, "appuser") before those
    # containers start. Runs as root, idempotent, exits 0.
    volume_init:
        image: alpine:3.21
        container_name: ${COMPOSE_PROJECT_NAME:-urban-platform}-volume-init
        command: chown -R 1000:1000 /app/staticfiles /app/mediafiles /app/.cache/uv
        volumes:
            - static_volume:/app/staticfiles
            - media_volume:/app/mediafiles
            - uv_cache:/app/.cache/uv
        restart: "no"

    static_collector:
        <<: *django-common
        container_name: ${COMPOSE_PROJECT_NAME:-urban-platform}-static-collector
        command: uv run python manage.py collectstatic --noinput --clear
        volumes:
            - static_volume:/app/staticfiles
            - uv_cache:/app/.cache/uv
        depends_on:
            db:
                condition: service_healthy
            volume_init:
                condition: service_completed_successfully
        restart: "no"

    migrator:
        <<: *django-common
        container_name: ${COMPOSE_PROJECT_NAME:-urban-platform}-migrator
        command: uv run python manage.py migrate --noinput
        depends_on:
            db:
                condition: service_healthy
            volume_init:
                condition: service_completed_successfully
        restart: "no"

volumes:
    postgres_data:
    static_volume:
    media_volume:
    redis_data:
        driver: local
    uv_cache:

networks:
    internal:
    nginx:
        external: true
        name: nginx
