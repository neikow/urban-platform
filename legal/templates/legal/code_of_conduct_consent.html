{% extends "base.html" %}
{% load static i18n %}

{% block title %}{% trans "Code of conduct" %}{% endblock %}

{% block content %}
    <article>
        <header class="bg-base-200/60 border-b border-base-300/70">
            <div class="container mx-auto px-6 sm:px-8 lg:px-12 py-12 md:py-16">
                <p class="section-label mb-2">{% trans "Legal" %}</p>
                <h1
                    class="
                        font-display font-black uppercase leading-tight text-balance
                        text-[clamp(2rem,5vw,4rem)]
                    "
                >
                    {% trans "Signing the code of conduct" %}
                </h1>
            </div>
        </header>
        <div class="container mx-auto px-6 sm:px-8 lg:px-12 py-12 pb-40">
            <main class="page-content max-w-3xl">
                {{ content|safe }}
                <span id="page-content-end"></span>
            </main>
        </div>
    </article>

    <div id="consent-banner" class="fixed bottom-0 left-0 w-full bg-base-100 border-t border-base-300 shadow-lg z-50">
        <form
            method="post"
            id="consent-form"
            class="container mx-auto px-6 sm:px-8 py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4"
        >
            {% csrf_token %}
            <label class="flex items-start sm:items-center gap-3 cursor-pointer flex-1">
                <input
                    type="checkbox"
                    name="consent"
                    id="consent-checkbox"
                    class="checkbox checkbox-primary checkbox-sm mt-0.5 sm:mt-0"
                    disabled
                >
                <span id="consent-label-read" class="text-sm font-medium" style="display: none">
                    {% trans "I have read and accept the code of conduct" %}
                </span>
                <span id="consent-label-unread" class="text-sm text-base-content/60">
                    {% trans "Please read the entire charter before accepting" %}
                </span>
            </label>
            <button
                type="submit"
                id="submit-btn"
                class="btn btn-primary border-none font-semibold shrink-0"
                disabled
            >
                {% trans "Accept and continue" %}
            </button>
        </form>
    </div>
{% endblock %}

{% block extra_js %}
    <script type="text/javascript" src="{% static 'js/code_of_conduct_page.js' %}"></script>
{% endblock %}
