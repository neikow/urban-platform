{% load wagtailcore_tags custom_blocks %}

<div
    {% if value.max_width %}
        style="max-width: {{ value.max_width }}px"
    {% endif %}
    class="{% if container %}container mx-auto{% endif %} px-4 my-2 md:my-4 lg:my-8 {% text_justification_class value.justification %}"
>
    {{ value.text|richtext }}
</div>
