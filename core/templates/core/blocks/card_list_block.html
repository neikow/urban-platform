{% load i18n wagtailimages_tags %}

<div class="{% if container %} container mx-auto {% endif %} px-4 py-12 no-page-style">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for card in self %}
            <div class="card bg-base-100 shadow-sm">
                {% if card.image %}
                    <figure>
                        {% image card.image fill-600x400 alt=card.alt_text %}
                    </figure>
                {% endif %}
                <div class="card-body">
                    <h2 class="card-title text-lg">{{ card.title }}</h2>
                    <p class="text-sm leading-relaxed text-base-content/70">{{ card.description }}</p>
                    {% if card.link %}
                        <div class="card-actions justify-end">
                            {% include "core/components/io/learn_more_button.html" with url=card.link %}
                        </div>
                    {% endif %}
                </div>
            </div>
        {% endfor %}
    </div>
</div>
