{% load wagtailimages_tags custom_blocks %}

{% get_image_config value.size as cfg %}

<div class="flex justify-center my-4 lg:my-8">
    <div class="{{ cfg.class }} w-full">
        {% image value.image cfg.rendition alt=value.alt_text|default:value.image.title class="rounded-lg h-auto w-full" %}
    </div>
</div>
