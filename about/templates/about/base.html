{% extends "base.html" %}

{% block content %}
    <article>
        <header class="bg-base-200/60 border-b border-base-300/70">
            <div class="container mx-auto px-6 sm:px-8 lg:px-12 py-12 md:py-16 lg:py-20">
                {% include "components/navigation/breadcrumbs.html" with page=page %}
                <h1
                    class="
                        font-display font-black uppercase leading-tight text-balance
                        text-[clamp(2.2rem,5.5vw,4.5rem)]
                        mt-4
                    "
                >
                    {{ page.title }}
                </h1>
            </div>
        </header>
        <div class="container mx-auto px-6 sm:px-8 lg:px-12 py-12 md:py-16 min-h-[40vh]">
            <main class="page-content max-w-3xl">
                {% block about_content %}{% endblock %}
            </main>
        </div>
    </article>
{% endblock %}
